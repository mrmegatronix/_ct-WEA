<!DOCTYPE html>
<html>
<body>
    <img id="srcImg" crossorigin="anonymous" src="file:///home/zeus/.gemini/antigravity/brain/ad1489f0-a9d4-4722-baf9-e14a806ced27/christchurch_gis_map_1779153689320.png" style="display:none;" />
    <canvas id="canvas" width="800" height="800" style="display:none;"></canvas>
    <textarea id="b64data" style="width:100%; height:400px;"></textarea>
    <script>
        const img = document.getElementById('srcImg');
        const canvas = document.getElementById('canvas');
        const textarea = document.getElementById('b64data');
        
        img.onload = function() {
            const ctx = canvas.getContext('2d');
            ctx.drawImage(img, 0, 0, 800, 800);
            const dataUrl = canvas.toDataURL('image/jpeg', 0.7);
            textarea.value = dataUrl;
        };
    </script>
</body>
</html>
