<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Christchurch Weather Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Oswald:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #D4AF37;
            --text-main: #ffffff;
            --text-dim: rgba(255,255,255,0.6);
            --glass: rgba(255,255,255,0.05);
            --glass-border: rgba(255,255,255,0.1);
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            background-color: #050505;
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
        }

        h1, h2, h3, .font-heading {
            font-family: 'Oswald', sans-serif;
            text-transform: uppercase;
        }

        /* Real-time Dynamic Background */
        #dynamic-bg {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            z-index: -1;
            transition: 2s ease-in-out;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
        }

        .bg-night { background: linear-gradient(135deg, #020617 0%, #0f172a 100%) !important; }
        .bg-sunrise { background: linear-gradient(135deg, #ffedd5 0%, #fdba74 50%, #f97316 100%) !important; }
        .bg-day { background: linear-gradient(135deg, #38bdf8 0%, #0ea5e9 100%) !important; }
        .bg-sunset { background: linear-gradient(135deg, #f97316 0%, #7c2d12 100%) !important; }
        .bg-cloudy { background: linear-gradient(135deg, #4b5563 0%, #1f2937 100%) !important; }

        /* Stars for night mode */
        #stars {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: radial-gradient(white, rgba(255,255,255,.2) 2px, transparent 40px);
            background-size: 550px 550px;
            opacity: 0;
            transition: 2s;
        }
        .stars-visible { opacity: 0.3 !important; }

        /* Slide System */
        .viewport {
            position: relative;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        .slide {
            position: absolute;
            top: 0; left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            transform: translateX(50px);
            transition: all 1s cubic-bezier(0.4, 0, 0.2, 1);
            pointer-events: none;
            padding: 4rem;
        }

        .slide.active {
            opacity: 1;
            transform: translateX(0);
            pointer-events: auto;
        }

        /* Current Weather Slide */
        .dashboard {
            width: 100%;
            max-width: 1400px;
            display: flex;
            flex-direction: column;
            gap: 3rem;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            border-bottom: 4px solid var(--gold);
            padding-bottom: 1.5rem;
        }

        .city {
            font-size: 6rem;
            font-weight: 900;
            line-height: 1;
            letter-spacing: -2px;
        }

        .clock {
            font-size: 5rem;
            font-weight: 700;
            color: var(--gold);
        }

        .main-weather {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: var(--glass);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 40px;
            padding: 4rem;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
        }

        .icon-container {
            width: 350px;
            height: 350px;
            filter: drop-shadow(0 0 50px rgba(255,255,255,0.3));
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .icon-container svg {
            overflow: visible; /* Allow animations to exceed viewBox without clipping */
            width: 100%;
            height: 100%;
        }

        .temp-display {
            display: flex;
            align-items: flex-start;
        }

        .temp-main {
            font-size: 18rem;
            font-weight: 900;
            line-height: 1; /* Increased from 0.8 to prevent vertical clipping */
            background: linear-gradient(to bottom, #fff, #ccc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            padding: 0.5rem 0; /* Extra safety margin */
        }

        .temp-unit {
            font-size: 6rem;
            color: var(--gold);
            margin-top: 1.5rem;
        }

        .temp-highlow {
            display: flex;
            flex-direction: column;
            justify-content: center;
            margin-left: 3rem;
            padding-left: 3rem;
            border-left: 4px solid var(--gold);
            font-size: 3rem;
            font-weight: 700;
            gap: 1.5rem;
        }

        .temp-highlow span { color: var(--gold); }

        /* Metrics Cards */
        .cards {
            display: flex;
            gap: 2rem;
        }

        .card {
            flex: 1;
            background: var(--glass);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 30px;
            padding: 2.5rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: 0.3s;
        }

        .card-value { font-size: 5.5rem; font-weight: 900; }
        .card-label { font-size: 2rem; color: var(--gold); letter-spacing: 4px; font-weight: 700; margin-bottom: 0.5rem; }

        /* 7-Day Forecast Slide */
        .forecast-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 1.5rem;
            width: 100%;
            height: 80%;
        }

        .day-card {
            background: var(--glass);
            backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 2.5rem 1rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            text-align: center;
            animation: fadeInScale 0.5s ease-out forwards;
            opacity: 0;
        }

        @keyframes fadeInScale {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }

        .day-name { font-size: 2.5rem; font-weight: 800; color: var(--gold); }
        .day-icon { width: 140px; height: 140px; margin: 1rem 0; }
        .day-temp { font-size: 3.5rem; font-weight: 900; }
        .day-highlow-small { font-size: 1.8rem; color: var(--text-dim); }

        /* Status & UI */
        .status {
            position: fixed;
            top: 2rem; right: 2rem;
            font-size: 1.2rem;
            letter-spacing: 2px;
            color: var(--text-dim);
            display: flex;
            align-items: center;
            gap: 10px;
            z-index: 100;
            font-weight: 700;
        }

        .status::before {
            content: '';
            width: 10px; height: 10px;
            border-radius: 50%;
            background: #ef4444;
        }
        .status.connected::before { background: #10b981; box-shadow: 0 0 15px #10b981; }

        /* Animations */
        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .animate-rotate { animation: rotate 10s linear infinite; }
        
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-20px); } }
        .animate-float { animation: float 6s ease-in-out infinite; }

        @keyframes rain { 
            0% { transform: translateY(-5px); opacity: 0; }
            50% { opacity: 1; }
            100% { transform: translateY(15px); opacity: 0; }
        }
        .rain-drop { animation: rain 1s linear infinite; }

        /* Navigation Hub */
        nav#nav-hub {
            position: fixed; bottom: 0; left: 0; right: 0;
            background: rgba(0,0,0,0.9);
            backdrop-filter: blur(15px);
            border-top: 1px solid rgba(255,255,255,0.1);
            padding: 1.5rem;
            display: flex; justify-content: center; gap: 30px;
            z-index: 9999;
            transform: translateY(100%);
            transition: 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }
        body:hover nav#nav-hub { transform: translateY(0); }
        nav#nav-hub a { color: #888; text-decoration: none; font-size: 1rem; font-weight: 800; text-transform: uppercase; transition: 0.3s; }
        nav#nav-hub a:hover { color: var(--gold); }
        nav#nav-hub a.active { color: var(--gold); border-bottom: 2px solid var(--gold); }
    </style>
</head>
<body>
    <div id="dynamic-bg">
        <div id="stars"></div>
    </div>

    <div class="status" id="status">INITIALIZING</div>

    <div class="viewport">
        <!-- Slide 1: Current Weather -->
        <div class="slide active" id="slide-current">
            <div class="dashboard">
                <div class="header">
                    <div class="city font-heading">Christchurch</div>
                    <div class="clock font-heading" id="clock">--:--</div>
                </div>

                <div class="main-weather">
                    <div class="icon-container animate-float" id="main-icon">
                        <!-- SVG injected via JS -->
                    </div>
                    
                    <div class="temp-display font-heading">
                        <div class="temp-main" id="temp">--</div>
                        <div class="temp-unit">°C</div>
                        <div class="temp-highlow">
                            <div><span>MAX</span> <b id="high">--°</b></div>
                            <div style="opacity:0.6;"><span>MIN</span> <b id="low">--°</b></div>
                        </div>
                    </div>
                </div>

                <div class="cards">
                    <div class="card font-heading">
                        <div class="card-label">Wind Speed</div>
                        <div class="card-value" id="wind-speed">--</div>
                        <div id="wind-icon" style="width: 80px; height: 80px;"></div>
                    </div>
                    <div class="card font-heading">
                        <div class="card-label">Rainfall</div>
                        <div class="card-value" id="rain">--</div>
                        <div style="font-size: 1.5rem; color: var(--text-dim);">mm today</div>
                    </div>
                    <div class="card font-heading">
                        <div class="card-label">Conditions</div>
                        <div class="card-value" id="condition-text" style="font-size: 3rem;">--</div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Slide 2: 7-Day Forecast -->
        <div class="slide" id="slide-forecast">
            <div class="dashboard">
                <div class="header">
                    <div class="city font-heading">7-Day Forecast</div>
                    <div class="clock font-heading">Christchurch</div>
                </div>
                
                <div class="forecast-grid" id="forecast-container">
                    <!-- Daily cards injected here -->
                </div>
            </div>
        </div>
    </div>

    <!-- Navigation Hub -->
    <nav id="nav-hub">
        <a href="../_ct-MATRIX/index.html">📺 Display</a>
        <a href="../_ct-MATRIX/masteradmin.html">🛠 Admin</a>
        <span style="color:#333">|</span>
        <a href="../_ct-MOM/index.html">🌸 MOM</a>
        <a href="../_ct-MMR/index.html">🥩 MMR</a>
        <a href="../_ct-ACE/index.html">🃏 ACE</a>
        <a href="index.html" class="active">🌦 WEA</a>
        <a href="../_ct-FIR/index.html">🔥 FIR</a>
        <a href="../_ct-NIM/index.html">🎨 NIM</a>
    </nav>

    <script src="app.js"></script>
</body>
</html>
