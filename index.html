<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Christchurch Weather Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Oswald:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #D4AF37;
            --gold-glow: rgba(212, 175, 55, 0.3);
            --text-main: #ffffff;
            --text-dim: rgba(255,255,255,0.6);
            --glass: rgba(255,255,255,0.03);
            --glass-strong: rgba(255,255,255,0.08);
            --glass-border: rgba(255,255,255,0.15);
            --bg-dark: #020617;
        }

        .text-value { font-family: 'Oswald', sans-serif; font-weight: 700; text-transform: uppercase; }
        .text-label { font-family: 'Inter', sans-serif; font-weight: 600; text-transform: uppercase; letter-spacing: 4px; color: var(--gold); opacity: 0.8; }
        .text-status { font-family: 'Oswald', sans-serif; font-weight: 500; text-transform: uppercase; letter-spacing: 2px; }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            background-color: #050505;
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
        }

        h1, h2, h3, .font-heading {
            font-family: 'Oswald', sans-serif;
            text-transform: uppercase;
        }

        /* Real-time Dynamic Background with Mesh Gradient */
        #dynamic-bg {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            z-index: -1;
            transition: background 3s ease-in-out;
            background: var(--bg-dark);
            overflow: hidden;
        }

        .mesh-gradient {
            position: absolute;
            top: -50%; left: -50%; width: 200%; height: 200%;
            background: 
                radial-gradient(circle at 30% 30%, rgba(30, 41, 59, 0.5) 0%, transparent 50%),
                radial-gradient(circle at 70% 70%, rgba(15, 23, 42, 0.5) 0%, transparent 50%),
                radial-gradient(circle at 50% 50%, rgba(2, 6, 23, 0.8) 0%, transparent 100%);
            animation: meshMove 20s ease-in-out infinite alternate;
            filter: blur(80px);
        }

        @keyframes meshMove {
            0% { transform: rotate(0deg) scale(1); }
            100% { transform: rotate(15deg) scale(1.1); }
        }

        .bg-night .mesh-gradient { background: radial-gradient(circle at 50% 50%, #0f172a 0%, #020617 100%); }
        .bg-sunrise .mesh-gradient { background: radial-gradient(circle at 50% 10%, #fb923c 0%, #7c2d12 100%); }
        .bg-day .mesh-gradient { background: radial-gradient(circle at 50% 50%, #0ea5e9 0%, #0369a1 100%); }
        .bg-sunset .mesh-gradient { background: radial-gradient(circle at 50% 90%, #f97316 0%, #451a03 100%); }
        .bg-cloudy .mesh-gradient { background: radial-gradient(circle at 50% 50%, #4b5563 0%, #111827 100%); }

        /* Stars for night mode */
        #stars {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: radial-gradient(white, rgba(255,255,255,.2) 2px, transparent 40px);
            background-size: 550px 550px;
            opacity: 0;
            transition: 2s;
        }
        .stars-visible { opacity: 0.3 !important; }

        /* Slide System */
        .viewport {
            position: relative;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        .slide {
            position: absolute;
            top: 0; left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-direction: column;
            opacity: 0;
            visibility: hidden;
            transform: scale(1.1);
            filter: blur(20px);
            transition: all 1.5s cubic-bezier(0.2, 0.8, 0.2, 1);
            pointer-events: none;
            padding: 4rem 6rem;
            z-index: 1;
        }

        .slide.active {
            opacity: 1;
            visibility: visible;
            transform: scale(1);
            filter: blur(0);
            pointer-events: auto;
            z-index: 10;
        }

        /* Staggered Content Animation */
        .slide.active .dashboard > * {
            animation: slideUpFade 0.8s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
            opacity: 0;
        }

        .slide.active .dashboard > *:nth-child(1) { animation-delay: 0.1s; }
        .slide.active .dashboard > *:nth-child(2) { animation-delay: 0.3s; }
        .slide.active .dashboard > *:nth-child(3) { animation-delay: 0.5s; }

        @keyframes slideUpFade {
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Current Weather Slide */
        .dashboard {
            width: 100%;
            max-width: 1800px;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            border-bottom: 4px solid var(--gold);
            padding-bottom: 1.5rem;
            width: 100%;
        }

        .city {
            font-size: clamp(4rem, 8vw, 8rem);
            font-weight: 700;
            line-height: 0.9;
            letter-spacing: -3px;
            font-family: 'Oswald', sans-serif;
        }

        .clock {
            font-size: clamp(3rem, 6vw, 6rem);
            font-weight: 500;
            color: var(--gold);
            font-family: 'Oswald', sans-serif;
        }

        .main-weather {
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--glass);
            backdrop-filter: blur(50px);
            border: 1px solid var(--glass-border);
            border-radius: 80px;
            padding: 4rem 6rem;
            box-shadow: 
                0 100px 150px -50px rgba(0,0,0,0.8),
                inset 0 0 0 1px rgba(255,255,255,0.1);
            position: relative;
            gap: 8rem;
            width: 100%;
            margin: 2rem 0;
        }

        .icon-container {
            width: 300px;
            height: 300px;
            filter: drop-shadow(0 0 50px rgba(255,255,255,0.3));
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .icon-container svg {
            overflow: visible; /* Allow animations to exceed viewBox without clipping */
            width: 100%;
            height: 100%;
        }

        .temp-display {
            display: flex;
            align-items: flex-start;
        }

        .temp-main {
            font-size: clamp(8rem, 16vw, 16rem);
            font-weight: 700;
            line-height: 0.75; 
            color: #fff;
            text-shadow: 0 0 60px rgba(255,255,255,0.2);
            font-family: 'Oswald', sans-serif;
        }

        .temp-unit {
            font-size: 10rem;
            color: var(--gold);
            margin-top: 1rem;
            font-weight: 300;
            font-family: 'Inter', sans-serif;
        }

        .temp-highlow {
            display: flex;
            flex-direction: column;
            justify-content: center;
            margin-left: 3rem;
            padding-left: 3rem;
            border-left: 6px solid var(--gold);
            font-size: 3rem;
            font-weight: 500;
            gap: 1rem;
            font-family: 'Oswald', sans-serif;
        }

        .temp-highlow span { color: var(--gold); }

        /* Metrics Cards */
        .cards {
            display: flex;
            gap: 2rem;
        }

        .card {
            flex: 1;
            background: var(--glass);
            backdrop-filter: blur(30px);
            border: 1px solid var(--glass-border);
            border-radius: 40px;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: inset 0 0 0 1px rgba(255,255,255,0.05);
        }

        .card:hover {
            background: var(--glass-strong);
            transform: translateY(-10px);
            border-color: var(--gold);
            box-shadow: 0 20px 40px -10px rgba(0,0,0,0.5), inset 0 0 0 1px var(--gold-glow);
        }

        .card-value { font-size: 6rem; font-weight: 700; font-family: 'Oswald', sans-serif; }
        .card-label { font-size: 1.8rem; color: var(--gold); letter-spacing: 5px; font-weight: 600; margin-bottom: 1rem; opacity: 0.8; }
        .condition-text { font-family: 'Oswald', sans-serif; text-transform: uppercase; letter-spacing: 2px; }

        /* 7-Day Forecast Slide */
        .forecast-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 1.5rem;
            width: 100%;
            height: auto;
            max-height: 750px;
        }

        .day-card {
            background: var(--glass);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 30px;
            padding: 3rem 1.5rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            text-align: center;
            transition: all 0.4s ease;
            box-shadow: inset 0 0 0 1px rgba(255,255,255,0.05);
        }

        .day-card:hover {
            background: var(--glass-strong);
            border-color: var(--gold);
            transform: translateY(-5px) scale(1.02);
        }

        .day-name { font-size: 3rem; font-weight: 700; color: var(--gold); margin-bottom: 1rem; font-family: 'Oswald', sans-serif; }
        .day-icon { width: 140px; height: 140px; margin: 1.5rem 0; filter: drop-shadow(0 0 30px rgba(255,255,255,0.2)); }
        .day-temp { font-size: 5rem; font-weight: 700; margin-bottom: 0.5rem; font-family: 'Oswald', sans-serif; }
        .day-highlow-small { font-size: 2.2rem; color: var(--text-dim); font-weight: 500; font-family: 'Oswald', sans-serif; }

        /* Status & UI */
        .status {
            position: fixed;
            top: 2rem; left: 50%;
            transform: translateX(-50%);
            font-size: 1.8rem;
            letter-spacing: 4px;
            color: var(--text-dim);
            display: flex;
            align-items: center;
            gap: 20px;
            z-index: 100;
            font-weight: 700;
            background: rgba(255,255,255,0.05);
            padding: 1rem 2rem;
            border-radius: 100px;
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            font-family: 'Oswald', sans-serif;
            text-transform: uppercase;
        }

        .status::before {
            content: '';
            width: 12px; height: 12px;
            border-radius: 50%;
            background: #ef4444;
            animation: pulse 2s infinite;
        }
        .status.connected::before { background: #10b981; box-shadow: 0 0 20px #10b981; }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.5); opacity: 0.5; }
            100% { transform: scale(1); opacity: 1; }
        }

        /* Animations */
        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .animate-rotate { animation: rotate 10s linear infinite; }
        
        @keyframes drift { 0%, 100% { transform: translateX(0); } 50% { transform: translateX(30px); } }
        .animate-drift { animation: drift 12s ease-in-out infinite; }
        
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-20px); } }
        .animate-float { animation: float 6s ease-in-out infinite; }

        @keyframes rain { 
            0% { transform: translateY(-5px); opacity: 0; }
            50% { opacity: 1; }
            100% { transform: translateY(15px); opacity: 0; }
        }
        /* Progress Bar */
        .progress-container {
            position: fixed;
            bottom: 0; left: 0; width: 100%; height: 10px;
            background: rgba(255,255,255,0.05);
            z-index: 1000;
        }
        #progress-bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, var(--gold), #fff);
            box-shadow: 0 0 20px var(--gold);
            transition: width 0.1s linear;
        }

        /* Navigation Hub */
        nav#nav-hub {
            position: fixed; bottom: 0; left: 0; right: 0;
            background: rgba(0,0,0,0.9);
            backdrop-filter: blur(15px);
            border-top: 1px solid rgba(255,255,255,0.1);
            padding: 1.5rem;
            display: flex; justify-content: center; gap: 30px;
            z-index: 9999;
            transform: translateY(100%);
            transition: 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }
        nav#nav-hub.show { transform: translateY(0); }
        nav#nav-hub a { color: #888; text-decoration: none; font-size: 1rem; font-weight: 800; text-transform: uppercase; transition: 0.3s; }
        nav#nav-hub a:hover { color: var(--gold); }
        nav#nav-hub a.active { color: var(--gold); border-bottom: 2px solid var(--gold); }
    </style>
</head>
<body>
    <div id="dynamic-bg">
        <div class="mesh-gradient"></div>
        <div id="stars"></div>
        <canvas id="particles" style="position: absolute; top: 0; left: 0;"></canvas>
    </div>

    <div class="status text-status" id="status">
        <span id="status-text">INITIALIZING</span>
        <span style="opacity:0.4; margin-left:10px;">|</span>
        <span style="font-size:1.2rem; opacity:0.6; margin-left:10px;">LAST SYNC: <b id="last-sync">--:--</b></span>
    </div>

    <div class="viewport">
        <!-- Slide 1: Current Weather -->
        <div class="slide active" id="slide-current">
            <div class="dashboard">
                <div class="header">
                    <div>
                        <div class="text-label" style="font-size: 2.2rem; letter-spacing: 12px; margin-bottom: 1.2rem; color: #ffffff; text-shadow: 0 0 25px rgba(255, 215, 0, 0.8); opacity: 1; font-weight: 800;">CURRENT WEATHER</div>
                        <div class="city text-value" style="font-size: 8rem; color: var(--gold);">Christchurch</div>
                    </div>
                    <div class="clock text-value" id="clock" style="font-size: 5rem;">--:--</div>
                </div>

                <div class="main-weather">
                    <div class="icon-container animate-float" id="main-icon">
                        <!-- SVG injected via JS -->
                    </div>
                    
                    <div class="temp-display text-value">
                        <div class="temp-main" id="temp">--</div>
                        <div class="temp-unit">°C</div>
                        <div class="temp-highlow">
                            <div><span class="text-label" style="color:inherit; font-size: 1.2rem;">MAX</span> <b id="high">--°</b></div>
                            <div style="opacity:0.6;"><span class="text-label" style="color:inherit; font-size: 1.2rem;">MIN</span> <b id="low">--°</b></div>
                        </div>
                    </div>

                    <div id="weather-summary" style="position: absolute; bottom: 2rem; left: 50%; transform: translateX(-50%); font-size: 1.5rem; color: var(--text-dim); font-weight: 500; letter-spacing: 1px; text-transform: none; font-family: 'Inter', sans-serif;">
                        Gathering atmospheric data...
                    </div>
                </div>

                <div class="cards">
                    <div class="card">
                        <div class="text-label">Wind Speed</div>
                        <div id="wind-icon" style="width: 80px; height: 80px; margin: 0.5rem 0;"></div>
                        <div class="card-value text-value" id="wind-speed">--</div>
                    </div>
                    <div class="card">
                        <div class="text-label">Rainfall</div>
                        <div class="card-value text-value" id="rain">--</div>
                        <div class="text-label" style="font-size: 1rem; opacity: 0.6;">MM TODAY</div>
                    </div>
                    <div class="card">
                        <div class="text-label">Conditions</div>
                        <div class="card-value text-value" id="condition-text" style="font-size: 3rem;">--</div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Slide 3: Rain Radar -->
        <div class="slide" id="slide-radar">
            <div class="dashboard">
                <div class="header">
                    <div>
                        <div class="text-label" style="font-size: 1.5rem; letter-spacing: 10px; margin-bottom: 0.5rem; color: var(--gold);">MATRIX SATELLITE</div>
                        <div class="city text-value" style="font-size: 6rem;">Rain Radar</div>
                    </div>
                </div>
                <div style="background: var(--glass); border: 2px solid var(--gold); border-radius: 40px; overflow: hidden; height: 600px; width: 100%; box-shadow: 0 0 50px rgba(212, 175, 55, 0.2);">
                    <iframe src="https://www.windy.com/-Rain-radar-radar?radar,-43.532,172.636,8" style="width: 100%; height: 100%; border: none;"></iframe>
                </div>
            </div>
        </div>

        <!-- Slide 4: Wind Map -->
        <div class="slide" id="slide-wind">
            <div class="dashboard">
                <div class="header">
                    <div>
                        <div class="text-label" style="font-size: 1.5rem; letter-spacing: 10px; margin-bottom: 0.5rem; color: var(--gold);">MATRIX SATELLITE</div>
                        <div class="city text-value" style="font-size: 6rem;">Wind Velocity</div>
                    </div>
                </div>
                <div style="background: var(--glass); border: 2px solid var(--gold); border-radius: 40px; overflow: hidden; height: 600px; width: 100%; box-shadow: 0 0 50px rgba(212, 175, 55, 0.2);">
                    <iframe src="https://www.windy.com/-Wind-wind?wind,-43.532,172.636,6" style="width: 100%; height: 100%; border: none;"></iframe>
                </div>
            </div>
        </div>


    </div>

    <!-- Navigation Hub -->
    <nav id="nav-hub">
        <a href="../_ct-MATRIX/index.html">📺 Display</a>
        <a href="../_ct-MATRIX/masteradmin.html">🛠 Admin</a>
        <span style="color:#333">|</span>
        <a href="../_ct-MOM/index.html">🌸 MOM</a>
        <a href="../_ct-MMR/index.html">🥩 MMR</a>
        <a href="../_ct-ACE/index.html">🃏 ACE</a>
        <a href="index.html" class="active">🌦 WEA</a>
    </nav>

    <!-- Progress Bar -->
    <div class="progress-container">
        <div id="progress-bar"></div>
    </div>

    <script src="app.js"></script>
</body>
</html>
